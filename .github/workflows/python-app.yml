name: SoulSense Python CI

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      run_all: ${{ steps.detect.outputs.run_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed modules
        id: detect
        run: |
          python -m pip install --upgrade pip > /dev/null 2>&1
          OUTPUT=$(python scripts/detect_changed_paths.py --base origin/main --head HEAD)
          MODULES=$(echo "$OUTPUT" | python -c "import sys, json; print(json.load(sys.stdin)['modules'])")
          RUN_ALL=$(echo "$OUTPUT" | python -c "import sys, json; print(str(json.load(sys.stdin)['run_all']).lower())")
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "run_all=$RUN_ALL" >> $GITHUB_OUTPUT
          echo "Changed modules: $MODULES"

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f backend/fastapi/requirements.txt ]; then pip install -r backend/fastapi/requirements.txt; fi
          pip install pytest pytest-mock pytest-cov pytest-xdist pytest-timeout flake8 coverage

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Type Check Root App
        run: mypy app/ --exclude backend/

      - name: Type Check Backend App
        run: mypy -p backend.fastapi.api

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Install security tools
        run: pip install bandit safety cyclonedx-bom

      - name: Generate SBOM
        run: |
          python scripts/generate_sbom.py --output sbom.json --project-root .
          python scripts/generate_sbom.py --validate-only --output sbom.json

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 365

      - name: Run Bandit security scan
        run: bandit -r backend/ --severity-level high

      - name: Run dependency vulnerability scan
        run: |
          safety check -r requirements.txt --severity-threshold high
          if [ -f backend/fastapi/requirements.txt ]; then safety check -r backend/fastapi/requirements.txt --severity-threshold high; fi

      - name: Run Vulnerability Gate
        run: python scripts/vulnerability_gate.py --threshold high --report vulnerability-report.json --project-root .
        env:
          VULNERABILITY_GATE_ENABLED: true

      - name: Upload Vulnerability Report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report-${{ github.sha }}
          path: vulnerability-report.json
          retention-days: 90

      - name: Profile and Balance Tests (Issue #1436)
        timeout-minutes: 5
        if: ${{ needs.detect-changes.outputs.run_all == 'true' || contains('["app", "all"]', needs.detect-changes.outputs.modules) }}
        run: |
          # Profile test durations
          python scripts/test_profiler.py tests/ --output data/test_durations.json
          
          # Generate balanced shard assignments
          python scripts/test_shard_balancer.py tests/ --shards 4 --output data/shards.json
          
          # Show metrics
          python -c "import json; data = json.load(open('data/shards.json')); print(json.dumps(data['metrics'], indent=2))"

      - name: Test Root App (Balanced Shards)
        timeout-minutes: 25
      - name: Check Breaking Changes Changelog Gate
        if: github.event_name == 'pull_request'
        run: python scripts/changelog_gate.py --pr-body "${{ github.event.pull_request.body }}" --project-root . --report changelog-report.json

      - name: Upload Changelog Report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: changelog-report-${{ github.sha }}
          path: changelog-report.json
          retention-days: 90
      - name: Enforce Static Analysis Budget
        run: python scripts/static_analysis_gate.py --config config/static_analysis_budget.json --report static-analysis-budget-report.json

      - name: Upload Static Analysis Budget Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-budget-report-${{ github.sha }}
          path: static-analysis-budget-report.json
          retention-days: 30

      - name: Test Root App (Unit + Integration)
        timeout-minutes: 20
        if: ${{ needs.detect-changes.outputs.run_all == 'true' || contains('["app", "all"]', needs.detect-changes.outputs.modules) }}
        env:
          DISPLAY: ":0.0"
        run: |
          # Run balanced shards
          python scripts/run_balanced_shards.py --shards data/shards.json --output reports/shard_metrics.json
      
      - name: Run Serial Tests
        timeout-minutes: 15
        if: ${{ needs.detect-changes.outputs.run_all == 'true' || contains('["app", "all"]', needs.detect-changes.outputs.modules) }}
        run: |
          # Run serial tests sequentially with per-test timeout
          pytest tests/ -m "serial" --maxfail=5 --timeout=180 -v \
            --cov=app --cov=backend --cov-report=term-missing --cov-report=html:htmlcov

      - name: Cache Correctness Verification (Issue #1434)
        timeout-minutes: 10
        run: |
          # Run cache verifier unit tests
          pytest tests/unit/test_cache_correctness_verifier.py -v --tb=short
          
          # Generate verification report
          python -c "
          import json
          import asyncio
          from backend.fastapi.api.services.cache_service import CacheService
          from backend.fastapi.api.services.cache_correctness_verifier import run_cache_verification
          
          async def verify():
            service = CacheService()
            try:
              await service.connect()
              report = await run_cache_verification(service)
              
              with open('cache-verification-report.json', 'w') as f:
                json.dump(report, f, indent=2)
              
              print(f'✓ Cache Verification: {report[\"passed\"]}/{report[\"total_checks\"]} checks passed')
              if not report['success']:
                print('❌ Cache verification failed')
                exit(1)
            finally:
              if service.redis:
                await service.redis.close()
          
          asyncio.run(verify())
          "

      - name: Test Backend App
        timeout-minutes: 10
        if: ${{ needs.detect-changes.outputs.run_all == 'true' || contains('["backend", "all"]', needs.detect-changes.outputs.modules) }}
        run: |
          mkdir -p ../../data
          nohup python start_server.py --host 127.0.0.1 --port 8000 --no-reload --y > server.log 2>&1 &
          # Wait for server to be ready
          ready=false
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/api/v1/health > /dev/null; then
              echo "Server is ready!"
              ready=true
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

          if [ "$ready" = false ]; then
            echo "❌ Server failed to start. Logs:"
            cat server.log
            exit 1
          fi

          pytest -c pytest.ini tests/unit/ tests/integration/test_response_snapshots.py
          pytest -c pytest.ini tests/unit/

          echo "Validating security headers..."
          python ../../../scripts/validate_security_headers.py --url http://127.0.0.1:8000 --quiet

          echo "Running OWASP ZAP baseline scan..."
          docker run --rm -v $(pwd)/../..:/zap/wrk -t zaproxy/zap-baseline:latest -t http://host.docker.internal:8000 -r zap_report.html --alert-level Medium -z "-config rules.file=/zap/wrk/.zap/rules.tsv"
        working-directory: ./backend/fastapi

      - name: Upload ZAP Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: backend/fastapi/zap_report.html

      - name: Upload Test Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: htmlcov
          retention-days: 30

      - name: Upload Shard Metrics (Issue #1436)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-metrics-${{ github.sha }}
          path: |
            reports/shard_metrics.json
            data/shards.json
            data/test_durations.json
          retention-days: 30

      - name: Upload Cache Verification Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cache-verification-report-${{ github.sha }}
          path: cache-verification-report.json
          retention-days: 30

      - name: Test Environment Fidelity (Issue #1315)
        timeout-minutes: 10
        run: |
          # Run fidelity tests with metrics collection
          pytest tests/test_environment_fidelity.py -v --tb=short
          
          # Generate scorecard and check threshold
          python scripts/generate_fidelity_scorecard.py --output fidelity-scorecard.json --text > fidelity-scorecard.txt
          python scripts/generate_fidelity_scorecard.py --html fidelity-scorecard.html
          
          # Fail if scorecard indicates issues
          SCORE=$(python -c "import json; data = json.load(open('fidelity-scorecard.json')); print(int(data['overall_score']))")
          if [ $SCORE -lt 75 ]; then
            echo "❌ Fidelity score ($SCORE) below threshold (75)"
            exit 1
          fi
          echo "✓ Fidelity score: $SCORE/100"

      - name: Upload Fidelity Scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fidelity-scorecard-${{ github.sha }}
          path: |
            fidelity-scorecard.json
            fidelity-scorecard.txt
            fidelity-scorecard.html
          retention-days: 30
