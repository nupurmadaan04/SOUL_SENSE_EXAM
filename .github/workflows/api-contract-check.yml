name: API Response Contract Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/fastapi/tests/integration/__snapshots__/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  snapshot-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Snapshot Check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            
            // Add label indicating API Contract Change
            try {
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: prNumber,
                labels: ['api-contract-change']
              });
            } catch (error) {
              console.log("Could not add label:", error.message);
            }

            // Post comment for reviewer
            const body = '⚠️ **API Response Contract (Snapshot) has changed!**\n\nPlease review the snapshot diffs carefully to ensure that there are no unintended breaking changes to the frontend or downstream consumers. Reviewer approval is required before merging.';
            try {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: prNumber,
                body: body
              });
            } catch (error) {
              console.log("Could not create comment:", error.message);
            }
